name: Validate

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install homeassistant
          pip install pytest
          pip install ruff

      - name: Ruff
        run: |
          ruff check .

      - name: Tests
        run: |
          pytest -v